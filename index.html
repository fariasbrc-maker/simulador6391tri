<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">

<title>Simulador GERA TRI - Equipe 6391</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    background:#003B7A;
    color:white;
    font-family:'Outfit',sans-serif;
    max-width:800px;
    margin:auto;
    padding:20px;
}

h1{
    font-size:48px;
    font-weight:800;
    text-align:center;
    margin-bottom:10px;
}

.subtitulo{
    text-align:center;
    color:#FFD4A6;
    margin-bottom:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    color:#222;
    border-radius:15px;
    overflow:hidden;
}

th{
    background:#FF6200;
    color:white;
    padding:12px;
}

td{
    padding:10px;
}

input{
    width:95%;
    padding:18px;
    font-size:24px;
    border-radius:15px;
    border:none;
    background:#F5F5F5;
    font-family:'Outfit',sans-serif;
}

button{
    width:100%;
    padding:25px;
    font-size:32px;
    font-weight:800;
    border:none;
    border-radius:18px;
    background:#FF6200;
    color:white;
    cursor:pointer;
}

button:hover{
    transform:scale(1.02);
}

#resultado{
    margin-top:25px;
    background:white;
    color:#003B7A;
    padding:35px;
    border-radius:20px;
    text-align:center;
    font-size:54px;
    font-weight:800;
}

@media(max-width:768px){

    body{
        padding:15px;
    }

    h1{
        font-size:34px;
    }

    table{
        font-size:20px;
    }

    th{
        font-size:18px;
    }

    td{
        font-size:18px;
    }

    input{
        font-size:20px;
        padding:14px;
    }

    button{
        font-size:28px;
    }

}

</style>

</head>
<body>
    <h1>🚀 SIMULADOR GERA TRI</h1>

<div class="subtitulo">
Equipe 6391 • Acompanhe sua performance
</div>
    <table>

<tr>
<th>Item</th>
<th>Desafio</th>
<th>Valor Item</th>
<th>Realizado</th>
</tr>

<tr>
<td>Equilíbrio de Contas</td>
<td><input id="d1" value="6707332"></td>
<td><input id="v1" value="280"></td>
<td><input id="r1"></td>
</tr>

<tr>
<td>Proteção</td>
<td><input id="d2" value="40791"></td>
<td><input id="v2" value="240"></td>
<td><input id="r2"></td>
</tr>

<tr>
<td>Recuperação</td>
<td><input id="d3" value="235907"></td>
<td><input id="v3" value="140"></td>
<td><input id="r3"></td>
</tr>

<tr>
<td>Aquisição de Bens</td>
<td><input id="d4" value="6426269"></td>
<td><input id="v4" value="120"></td>
<td><input id="r4"></td>
</tr>

<tr>
<td>Engajamento</td>
<td><input id="d5" value="1792"></td>
<td><input id="v5" value="80"></td>
<td><input id="r5"></td>
</tr>

<tr>
<td>Sorte</td>
<td><input id="d6" value="10375"></td>
<td><input id="v6" value="80"></td>
<td><input id="r6"></td>
</tr>

<tr>
<td>Benefícios de Relacionamento</td>
<td><input id="d7" value="309"></td>
<td><input id="v7" value="30"></td>
<td><input id="r7"></td>
</tr>

</table>
    <button onclick="calcular()">Calcular</button>
    <div id="resultado">Pontuação Total: 0</div>
    <script>
        function calcular() {
            let total = 0;
            for (let i = 1; i <= 7; i++) {
                let desafio = parseFloat(document.getElementById("d" + i).value) || 0;
                let valor = parseFloat(document.getElementById("v" + i).value) || 1;
                let realizado = parseFloat(document.getElementById("r" + i).value) || 0;
                let meta = desafio / valor;
                let pontos = realizado / meta;
                total += pontos;
            }
            document.getElementById("resultado").innerHTML = "Pontuação Total: " + total.toFixed(2);
        }
    </script>
</body>
</html>
